<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 AI 도우미</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 16px;
    background: #f7f7f8;
  }
  h1 { font-size: 1.4rem; }
  #answer {
    min-height: 200px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    white-space: pre-wrap;
    margin-bottom: 12px;
  }
  .row { display: flex; gap: 8px; }
  #question {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
  }
  #send {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
  }
  #send:disabled { opacity: 0.6; cursor: default; }
</style>
</head>
<body>
  <h1>나만의 AI 도우미</h1>
  <p>무엇이든 물어보세요</p>
  <div id="answer">질문을 입력하고 보내기를 눌러보세요.</div>
  <div class="row">
    <input id="question" type="text" placeholder="궁금한 것을 입력하세요" />
    <button id="send">보내기</button>
  </div>

  <script>
    const questionEl = document.getElementById('question');
    const answerEl = document.getElementById('answer');
    const sendEl = document.getElementById('send');

    async function sendMessage() {
      const message = questionEl.value.trim();
      if (!message) return;

      sendEl.disabled = true;
      answerEl.textContent = '생각 중...';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        answerEl.textContent = res.ok ? data.reply : `오류: ${data.error}`;
      } catch (err) {
        answerEl.textContent = '네트워크 오류가 발생했습니다.';
      } finally {
        sendEl.disabled = false;
      }
    }

    sendEl.addEventListener('click', sendMessage);
    questionEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
